<body> <!-- Includes background image (light grey logo and white lines) styled in CSS -->

  <!-- Main menu, top right -->
  <div class="menubar">
    <div class="menutext">
        <span class="menuitem"><a href="about.html">About</a></span>
        <span class="menuitem"><a href="faq.html">F.A.Q.</a></span>
        <span class="menuitem"><a href="contribute.html">Contribute</a></span>
    </div>
  </div>

  <!-- Warning box -->
  <div id="warning_box"></div>

  <!-- Intro Stuff (Logo, selectors, etc.) -->
  <div class="intro">
    <!-- Pseudo Dojo Logo -->
    <a href="https://youtu.be/j9z4AJIx40M" target="_blank" title="The Pseudo Dojo"><img src="../img/logo.svg" class="logo hide"></a>

    <!-- Large Arrow -->
    <div class="arrow" id="MainArrow">
      <img src="../img/arrow.svg" class="arrow">
    </div>

    <!-- Quick Tutorial button -->
    <button class="help_button" onclick="dojoTour_guidedtour()" id="guided-tour-button" title="Guided Tour" >
      Quick Tutorial
    </button>

    <!-- Toggle for Download Mode or Testing Mode -->
    <div class="mode-wrapper" id="DojoMode">
      <span class="toggle-label">Click on an element to:</span>
      <div class="mode-toggle">
        <span class="mode-label left" style="text-align: right;">Download pseudo</span>
        <label class="switch">
          <input type="checkbox" id="modeToggle"  aria-label="Toggle between pseudo download mode and validation testing mode">
          <span class="slider"></span>
        </label>
        <span class="mode-label right">See test results</span>
      </div>
    </div>

    <!-- Pseudo selection bar -->
    <div class="selection_bar">

      <!-- Selection of TYPE -->
      <div class="selector">
        <label for="TYPE">Type:</label>
        <select id="TYPE" onchange="load_set_info();">
          <option value="nc">Norm-Conserving</option>
          <option value="paw">PAW</option>
        </select>
      </div>

      <!-- Selection of RELATIVISTIC -->
      <div class="selector">
        <label for="REL">Relativistic:</label>
        <select id="REL" style="width: 75px;">
          <option value="sr">Scalar</option>
          <option value="fr">Fully</option>
        </select>
      </div>

      <!-- Selection of VERSION -->
      <div class="selector">
        <label for="VER">Version:</label>
        <select id="VER" style="width: 60px;"></select>
      </div>

      <!-- Selection of XC functional -->
      <div class="selector">
        <label for="XC">XC:</label>
        <select id="XC" style="width: 80px;" onchange="localStorage.setItem('selectedXCF', document.getElementById('XCF').value); load_set_info();"></select>
      </div>

      <!-- Selection of ACCURACY -->
      <div class="selector">
        <label for="ACC">Accuracy:</label>
        <select id="ACC" style="width: 100px;">
          <option value="standard">Standard</option>
          <option value="stringent">Stringent</option>
        </select>
      </div>

      <!-- Selection of FORMAT -->
      <div class="selector">
        <label for="FMT">Format:</label>
        <select id="FMT" style="width: 75px;" onchange="localStorage.setItem('selectedFMT', document.getElementById('FMT').value);"></select>
      </div>

    </div>

  </div>

  <!-- Citation box -->
  <div id="citebox" class="citation_box"></div>

  <div class="wrapper">
    <div class="table">
  
      <div id="periodic-table"></div>

      <div class="detail-wrap">
        <div class="detail" id="X_n">
          <div class="zee" id="X_z">Z</div>
          <div class="valence" id="X_nv">#</div>
          <div class="levels" id="LEVS">
            <div id="X_hl">low</div>
            <div id="X_hn">middle</div>
            <div id="X_hh">high</div>
          </div>

          <div class="element" id="X_el">X</div>
          <div class="name" id="X_name">element name</div>
        </div>

        <!-- Labels -->
        <div class="label label-z">atomic number</div>
        <div class="label label-nv">number of valence orbitals</div>
        <div class="label label-ecut">e<sub>cut</sub> hints</div>

        <!-- Squiggles -->
        <img class="squiggles atnum" src="../img/z_squiggle.svg"></img>
        <img class="squiggles bracket" src="../img/bracket.svg"></img>
        <img class="squiggles vale" src="../img/nv_squiggle.svg"></img>
      </div>

      <div id="download_button" class="download_button">Download Table</div>

    </div>

  </div>


  <script>
      document.addEventListener("DOMContentLoaded", function() {
      // this function runs when the DOM is ready, i.e. when the document has been parsed
      dojo_start();
  });
